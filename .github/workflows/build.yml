name: Build Guest UEFI Disk

on:
  push:
    branches:
      - main
    paths:
      - guest/flake.nix
      - guest/flake.lock
      - guest/configuration.nix
      - .github/workflows/build.yml

permissions:
  contents: write

jobs:
  build-disk:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install Nix
        run: |
          sh <(curl -L https://nixos.org/nix/install) --daemon
          echo "experimental-features = nix-command flakes" | sudo tee -a /etc/nix/nix.conf

      - name: Generate version number
        id: version
        run: |
          VERSION=$(date +'%y.%m').${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build guest UEFI disk
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          nix build ./guest#packages.aarch64-linux.guest-image --print-build-logs

      - name: Package guest UEFI disk
        run: |
          mkdir -p release
          RESULT_PATH=$(readlink -f result)
          test -d "$RESULT_PATH"
          tar -C "$RESULT_PATH" -czf "release/nixos-${{ steps.version.outputs.version }}-aarch64-guest-uefi-disk.tar.gz" .

      - name: Upload guest UEFI disk artifact
        uses: actions/upload-artifact@v4
        with:
          name: guest-uefi-disk
          path: release/nixos-${{ steps.version.outputs.version }}-aarch64-guest-uefi-disk.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            "release/nixos-${{ steps.version.outputs.version }}-aarch64-guest-uefi-disk.tar.gz"
