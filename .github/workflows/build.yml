name: Build Guest Builder Bundle

on:
  push:
    branches:
      - main
    paths:
      - builder-guest/flake.nix
      - builder-guest/flake.lock
      - builder-guest/configuration.nix
      - builder-guest/builder-agent.sh
      - .github/workflows/build.yml

permissions:
  contents: write

jobs:
  build-guest-builder:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install Nix
        run: |
          sh <(curl -L https://nixos.org/nix/install) --daemon
          echo "experimental-features = nix-command flakes" | sudo tee -a /etc/nix/nix.conf

      - name: Generate version number
        id: version
        run: |
          VERSION=$(date +'%y.%m').${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build guest-builder bundle
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          nix build ./builder-guest#packages.aarch64-linux.builder-guest-bundle --print-build-logs

      - name: Package guest-builder bundle
        run: |
          mkdir -p release
          RESULT_PATH=$(readlink -f result)
          test -d "$RESULT_PATH"
          ZIP_PATH="$PWD/release/vzm-${{ steps.version.outputs.version }}-aarch64-guest-builder.zip"
          (
            cd "$RESULT_PATH"
            zip -r "$ZIP_PATH" kernel initrd rootfs.squashfs manifest.json
          )

      - name: Upload guest-builder artifact
        uses: actions/upload-artifact@v4
        with:
          name: guest-builder
          path: release/vzm-${{ steps.version.outputs.version }}-aarch64-guest-builder.zip
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            "release/vzm-${{ steps.version.outputs.version }}-aarch64-guest-builder.zip"
